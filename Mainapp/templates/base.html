<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Portfolio{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- FontAwesome for icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script>
  AOS.init();
</script>
<style>
.name-animated span {
  display: inline-block;
  opacity: 0;
  transform: translateY(10px);
  animation: fadeUp 0.5s ease-out forwards;
}

@keyframes fadeUp {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.hero-name {
  display: inline-block;
}

.glow-underline {
  position: absolute;
  bottom: 0;
  left: 0;
  height: 4px;
  width: 100%;
  background: linear-gradient(90deg, #3b82f6, #60a5fa);
  border-radius: 2px;
  animation: pulse-glow 2s ease-in-out infinite;
  box-shadow: 0 0 8px #60a5fa, 0 0 12px #3b82f6;
}

@keyframes pulse-glow {
  0%, 100% {
    opacity: 1;
    transform: scaleX(1);
  }
  50% {
    opacity: 0.7;
    transform: scaleX(1.1);
  }
}
[x-cloak] { display: none !important; }
</style>



    
</head>

<!-- Load Alpine.js BEFORE navbar -->
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

<body class="bg-white text-gray-800 scroll-smooth overflow-x-hidden" x-data="{ activeSection: '' }">


  <nav 
    x-data="{ mobileOpen: false, scrolled: false }"
    x-init="window.addEventListener('scroll', () => { scrolled = window.scrollY > 50 })"
    :class="{ 'shadow-md bg-white/90 backdrop-blur': scrolled }"
    class="fixed top-0 w-full z-50 transition-all duration-300 bg-white"
  >
    <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
      <!-- Logo -->
      <a href="/" class="text-xl font-bold text-blue-600">Portfolio</a>

     
      <!-- Desktop Links -->
      <div class="hidden md:flex space-x-6">
       
  

      </div>
    </div>

   
  </nav>


    <!-- Page Content -->
     <div class="pt-20 max-w-full overflow-x-hidden">
        {% block content %}{% endblock %}
    </div>

   
    <!-- AOS JS -->
        <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
        <script>
        AOS.init({
            once: true, // animate only once
            duration: 800, // animation duration in ms
        });
</script>

<!-- Footer -->
<footer class="bg-gray-800 text-white py-6 mt-8">
    <div class="max-w-6xl mx-auto px-4 flex flex-col sm:flex-row justify-between items-center">
        <p class="text-sm">&copy; {{ now.year }} Anurag Baitha. All rights reserved.</p>
        <div class="flex space-x-4 mt-3 sm:mt-0">
            <a href="https://www.linkedin.com/in/anurag-baitha/" class="hover:text-blue-400 transition">LinkedIn</a>
            <a href="https://github.com/BaithaAnurag?tab=repositories" class="hover:text-blue-400 transition">GitHub</a>
            <a href="https://mail.google.com/mail/?view=cm&fs=1&to=anuragbaitha673@gmail.com" target="_blank" class="hover:text-blue-400 transition">Email</a>


        </div>
    </div>
</footer>

<!-- AOS CSS -->
<link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">

<!-- AOS JS -->
<script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    AOS.init({ duration: 1000, once: true });
  });
</script>


<script>
document.addEventListener("DOMContentLoaded", () => {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const letters = entry.target.querySelectorAll('span');
        letters.forEach((letter, i) => {
          letter.style.animation = 'none'; // Reset animation
          letter.offsetHeight; // Trigger reflow
          letter.style.animation = `fadeUp 0.5s ease-out forwards`;
          letter.style.animationDelay = `${i * 100}ms`;
        });
      }
    });
  }, { threshold: 0.5 });

  observer.observe(document.querySelector('.name-animated'));
});
</script>


</body>
</html>
